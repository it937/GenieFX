<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GenieFX Market Ticker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    .header {
      text-align: center;
      padding: 20px;
      background: linear-gradient(90deg, #6a00ff, #8a2be2);
      color: white;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .ticker-container {
      border-top: 2px solid #6a00ff;
      border-bottom: 2px solid #6a00ff;
      padding: 10px 0;
      background: #111;
    }

    .footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="header">
    GenieFX Market Pulse
  </div>

  <div class="ticker-container">
    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>

    <tv-ticker-tape
      theme="dark"
      symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD,ICMARKETS:XAUUSD"
      show-symbol-logo
      color-theme="purple"
    ></tv-ticker-tape>
  </div>

  <div class="footer">
    Powered by GenieFX • Unlock wealth with a whisper
  </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=0.5"/>
  <title>GenieFX Market Ticker</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    .header {
      text-align: center;
      padding: 12px;
      background: linear-gradient(90deg, #6a00ff, #8a2be2);
      color: white;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }


    .footer {
      text-align: center;
      padding: 5px;
      font-size: 7px;
      color: #aaa;
    }
  </style>
</head>

<body>

  <div class="ticker-container">
    <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>

    <tv-ticker-tape
      theme="dark"
      symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD,ICMARKETS:XAUUSD"
      show-symbol-logo
      color-theme="purple"
     </div>

</body>
</html>
